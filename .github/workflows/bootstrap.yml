name: Bootstrap AWS OIDC

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  bootstrap:
    name: Create Terraform Backend and GitHub OIDC Role
    runs-on: ubuntu-latest
    environment: bootstrap

    defaults:
      run:
        working-directory: bootstrap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure temporary AWS bootstrap credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-oidc-bootstrap-${{ github.run_id }}

      - name: Get AWS account ID
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Create Terraform state bucket when missing
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
            echo "Terraform state bucket already exists."
          else
            if [ "${{ vars.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${{ vars.TF_STATE_BUCKET }}" \
                --region "${{ vars.AWS_REGION }}"
            else
              aws s3api create-bucket \
                --bucket "${{ vars.TF_STATE_BUCKET }}" \
                --region "${{ vars.AWS_REGION }}" \
                --create-bucket-configuration LocationConstraint="${{ vars.AWS_REGION }}"
            fi
          fi

          aws s3api put-public-access-block \
            --bucket "${{ vars.TF_STATE_BUCKET }}" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-versioning \
            --bucket "${{ vars.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${{ vars.TF_STATE_BUCKET }}" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":false}]}'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.12.2"
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=bootstrap/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -out=tfplan \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="terraform_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="website_bucket_name=${{ vars.S3_BUCKET_NAME }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repository=${{ github.event.repository.name }}" \
            -var="github_branch=main"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Publish bootstrap values
        run: |
          ROLE_ARN="$(terraform output -raw github_terraform_role_arn)"
          {
            echo "## AWS bootstrap completed"
            echo ""
            echo "Add or confirm these GitHub repository variables:"
            echo ""
            echo "- \`AWS_ACCOUNT_ID=${{ steps.account.outputs.account_id }}\`"
            echo "- \`AWS_REGION=${{ vars.AWS_REGION }}\`"
            echo "- \`TF_STATE_BUCKET=${{ vars.TF_STATE_BUCKET }}\`"
            echo "- \`S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }}\`"
            echo "- Deployment role: \`$ROLE_ARN\`"
            echo ""
            echo "After a successful OIDC deployment, delete the temporary AWS credential secrets."
          } >> "$GITHUB_STEP_SUMMARY"
